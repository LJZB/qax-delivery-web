<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Usuarios — QAXadmin</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-brand">QAX<span>admin</span></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html"><span class="nav-icon">📊</span> Dashboard</a>
      <a href="users.html" class="active"><span class="nav-icon">👥</span> Usuarios</a>
      <a href="products.html"><span class="nav-icon">📦</span> Productos</a>
      <a href="orders.html"><span class="nav-icon">📋</span> Órdenes</a>
      <a href="reports.html"><span class="nav-icon">📈</span> Reportes</a>
      <a href="index.html" onclick="sessionStorage.removeItem('qaxadmin_logged')" style="color:var(--red);"><span class="nav-icon">🚪</span> Cerrar Sesión</a>
    </nav>
  </aside>
  <main class="content">
    <div class="content-header"><h1>Usuarios</h1><p>Gestión de usuarios del sistema</p></div>
    <div class="card">
      <div class="toolbar">
        <input type="text" id="searchUser" placeholder="Buscar por nombre o email..." oninput="renderUsers()">
        <button class="btn btn-primary" onclick="openUserModal()">+ Nuevo Usuario</button>
      </div>
      <table class="data-table">
        <thead><tr>
          <th onclick="sortUsers('id')">ID ↕</th>
          <th onclick="sortUsers('nombre')">Nombre ↕</th>
          <th onclick="sortUsers('email')">Email ↕</th>
          <th onclick="sortUsers('rol')">Rol ↕</th>
          <th onclick="sortUsers('estado')">Estado ↕</th>
          <th>Acciones</th>
        </tr></thead>
        <tbody id="usersTableBody"></tbody>
      </table>
      <div class="pagination" id="usersPagination"></div>
    </div>
  </main>
</div>

<!-- User Modal -->
<div class="modal-overlay" id="userModal" style="display:none;">
  <div class="modal">
    <h3 id="userModalTitle">Nuevo Usuario</h3>
    <input type="hidden" id="editUserId">
    <div class="form-group"><label>Nombre</label><input type="text" id="userNombre" placeholder="Nombre completo"></div>
    <div class="form-group"><label>Email</label><input type="email" id="userEmail" placeholder="correo@example.com"></div>
    <div class="form-group"><label>Rol</label><select id="userRol"><option>Admin</option><option>Vendedor</option><option>Comprador</option></select></div>
    <div class="form-group"><label>Estado</label><label class="toggle"><input type="checkbox" id="userEstado" checked><span class="slider"></span></label> <span style="font-size:13px; margin-left:8px;" id="estadoLabel">Activo</span></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeUserModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveUser()">Guardar</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
if (!isLoggedIn()) window.location.href = 'index.html';

var users = getAdminData('qaxadmin_users');
var userSortKey = 'id';
var userSortDir = 1;
var userPage = 1;
var perPage = 10;

function sortUsers(key) {
  if (userSortKey === key) userSortDir *= -1;
  else { userSortKey = key; userSortDir = 1; }
  renderUsers();
}
function renderUsers() {
  var search = (document.getElementById('searchUser').value || '').toLowerCase();
  var filtered = users.filter(function(u) {
    return !search || u.nombre.toLowerCase().includes(search) || u.email.toLowerCase().includes(search);
  });
  filtered.sort(function(a, b) {
    var av = a[userSortKey], bv = b[userSortKey];
    if (typeof av === 'string') av = av.toLowerCase();
    if (typeof bv === 'string') bv = bv.toLowerCase();
    if (av < bv) return -1 * userSortDir;
    if (av > bv) return 1 * userSortDir;
    return 0;
  });
  var totalPages = Math.ceil(filtered.length / perPage);
  if (userPage > totalPages) userPage = totalPages || 1;
  var pageUsers = filtered.slice((userPage - 1) * perPage, userPage * perPage);

  document.getElementById('usersTableBody').innerHTML = pageUsers.map(function(u) {
    var estadoBadge = u.estado === 'active' ? 'badge-active' : 'badge-inactive';
    var estadoText = u.estado === 'active' ? 'Activo' : 'Inactivo';
    var rolBadge = 'badge-' + u.rol.toLowerCase();
    return '<tr>' +
      '<td>' + u.id + '</td>' +
      '<td>' + u.nombre + '</td>' +
      '<td>' + u.email + '</td>' +
      '<td><span class="badge ' + rolBadge + '">' + u.rol + '</span></td>' +
      '<td><span class="badge ' + estadoBadge + '">' + estadoText + '</span></td>' +
      '<td><button class="btn btn-outline btn-sm" onclick="editUser(\'' + u.id + '\')">Editar</button> <button class="btn btn-danger btn-sm" onclick="deleteUser(\'' + u.id + '\')">Eliminar</button></td>' +
      '</tr>';
  }).join('');

  var pagHTML = '<button ' + (userPage > 1 ? 'onclick="userPage=1;renderUsers()"' : 'disabled') + '>«</button>' +
    '<button ' + (userPage > 1 ? 'onclick="userPage--;renderUsers()"' : 'disabled') + '>‹</button>';
  for (var i = 1; i <= totalPages; i++) {
    pagHTML += '<button class="' + (i === userPage ? 'active' : '') + '" onclick="userPage=' + i + ';renderUsers()">' + i + '</button>';
  }
  pagHTML += '<button ' + (userPage < totalPages ? 'onclick="userPage++;renderUsers()"' : 'disabled') + '>›</button>' +
    '<button ' + (userPage < totalPages ? 'onclick="userPage=' + totalPages + ';renderUsers()"' : 'disabled') + '>»</button>';
  document.getElementById('usersPagination').innerHTML = pagHTML;
}

function openUserModal(editId) {
  var modal = document.getElementById('userModal');
  if (editId) {
    var u = users.find(function(x) { return x.id === editId; });
    if (!u) return;
    document.getElementById('userModalTitle').textContent = 'Editar Usuario';
    document.getElementById('editUserId').value = u.id;
    document.getElementById('userNombre').value = u.nombre;
    document.getElementById('userEmail').value = u.email;
    document.getElementById('userRol').value = u.rol;
    document.getElementById('userEstado').checked = u.estado === 'active';
    updateEstadoLabel();
  } else {
    document.getElementById('userModalTitle').textContent = 'Nuevo Usuario';
    document.getElementById('editUserId').value = '';
    document.getElementById('userNombre').value = '';
    document.getElementById('userEmail').value = '';
    document.getElementById('userRol').value = 'Comprador';
    document.getElementById('userEstado').checked = true;
    updateEstadoLabel();
  }
  modal.style.display = 'flex';
}
document.getElementById('userEstado').addEventListener('change', updateEstadoLabel);
function updateEstadoLabel() {
  document.getElementById('estadoLabel').textContent = document.getElementById('userEstado').checked ? 'Activo' : 'Inactivo';
}
function closeUserModal() { document.getElementById('userModal').style.display = 'none'; }
function editUser(id) { openUserModal(id); }

function saveUser() {
  var editId = document.getElementById('editUserId').value;
  var nombre = document.getElementById('userNombre').value.trim();
  var email = document.getElementById('userEmail').value.trim();
  var rol = document.getElementById('userRol').value;
  var estado = document.getElementById('userEstado').checked ? 'active' : 'inactive';
  if (!nombre || !email) { alert('Nombre y email son requeridos'); return; }
  if (editId) {
    var idx = users.findIndex(function(u) { return u.id === editId; });
    if (idx >= 0) { users[idx].nombre = nombre; users[idx].email = email; users[idx].rol = rol; users[idx].estado = estado; }
  } else {
    users.push({ id: 'a' + (users.length + 1), nombre: nombre, email: email, rol: rol, estado: estado, password: '123' });
  }
  setAdminData('qaxadmin_users', users);
  closeUserModal();
  renderUsers();
}

function deleteUser(id) {
  if (!confirm('¿Eliminar este usuario?')) return;
  users = users.filter(function(u) { return u.id !== id; });
  setAdminData('qaxadmin_users', users);
  renderUsers();
}

renderUsers();
</script>
</body>
</html>
